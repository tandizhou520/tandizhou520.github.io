<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>VBC能量测评报告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(145deg, #f0f3f8 0%, #ffffff 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .report {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,20,40,0.25);
            padding: 24px 20px 30px;
        }
        .deco {
            text-align: center;
            font-size: 28px;
            letter-spacing: 8px;
            color: #F5A623;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 30px;
            color: #1A2B4C;
            text-align: center;
            margin-bottom: 20px;
        }
        .user-card {
            background: linear-gradient(135deg, #1A2B4C, #2a3f5c);
            color: white;
            border-radius: 24px;
            padding: 22px;
            margin: 15px 0;
        }
        .user-name {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .user-meta {
            font-size: 14px;
            opacity: 0.9;
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #1A2B4C;
            margin: 20px 0 15px;
            display: flex;
            align-items: center;
        }
        .section-title span {
            background: #F5A623;
            width: 32px;
            height: 32px;
            border-radius: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
        }
        .score-item {
            display: flex;
            align-items: center;
            margin: 12px 0;
        }
        .score-label {
            width: 70px;
            font-weight: 500;
            color: #1A2B4C;
        }
        .score-bar-bg {
            flex: 1;
            height: 10px;
            background: #e6e9f0;
            border-radius: 10px;
            margin: 0 12px;
            overflow: hidden;
        }
        .score-bar {
            height: 100%;
            border-radius: 10px;
            width: 0%;
        }
        .score-value {
            min-width: 65px;
            text-align: right;
            font-weight: 600;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            margin-left: 6px;
        }
        .badge-red { background: #fee; color: #c0392b; border: 1px solid #e74c3c; }
        .badge-yellow { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
        .badge-green { background: #e0f2e0; color: #2e7d32; border: 1px solid #4caf50; }
        .badge-blue { background: #d1ecf1; color: #0c5460; border: 1px solid #17a2b8; }
        .card {
            background: #f8fafd;
            border-radius: 24px;
            padding: 20px;
            margin: 15px 0;
        }
        .quote {
            background: #fff8e7;
            border-left: 5px solid #F5A623;
            padding: 18px;
            border-radius: 18px;
            margin: 15px 0;
            font-style: italic;
        }
        .warning {
            background: #ffeded;
            border-left: 5px solid #e74c3c;
            padding: 18px;
            border-radius: 18px;
            margin: 15px 0;
        }
        .success {
            background: #e6f4e6;
            border-left: 5px solid #27ae60;
            padding: 18px;
            border-radius: 18px;
            margin: 15px 0;
        }
        .cta {
            background: #F5A623;
            color: #1A2B4C;
            font-weight: 600;
            font-size: 18px;
            padding: 18px;
            border-radius: 50px;
            text-align: center;
            margin: 30px 0 20px;
            box-shadow: 0 8px 20px -5px rgba(245,166,35,0.4);
        }
        .footer {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="report" id="report">
        <!-- 内容由JS动态生成 -->
    </div>

    <script>
        // 从URL获取参数
        function getParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                name: params.get('name') || '学员',
                date: params.get('date') || new Date().toLocaleDateString('zh-CN'),
                exist: parseFloat(params.get('exist')) || 5.0,
                conf: parseFloat(params.get('conf')) || 5.0,
                init: parseFloat(params.get('init')) || 5.0,
                dili: parseFloat(params.get('dili')) || 5.0,
                safe: parseFloat(params.get('safe')) || 5.0,
                trust: parseFloat(params.get('trust')) || 5.0,
                resp: parseFloat(params.get('resp')) || 5.0,
                comp: parseFloat(params.get('comp')) || 5.0
            };
        }

        // 获取分数对应的颜色和标签
        function getScoreInfo(score) {
            if (score <= 3) return { color: 'bar-red', badge: 'badge-red', text: '❌ 严重不足' };
            if (score <= 6) return { color: 'bar-orange', badge: 'badge-yellow', text: '⚠️ 需要关注' };
            return { color: 'bar-green', badge: 'badge-green', text: '✅ 能量充足' };
        }

        // 维度名称映射
        const dimNames = {
            exist: '存在感', conf: '自信感', init: '主动感',
            dili: '勤奋感', safe: '安全感', trust: '信任感',
            resp: '责任感', comp: '完形感'
        };

        // 维度解读库（可扩展）
        const interpretations = {
            exist: {
                low: '在集体中习惯沉默，害怕被注意到，对他人的评价过度敏感。',
                medium: '有时相信自己，有时怀疑自己，需要外界的肯定。',
                high: '能够坦然做自己，不害怕被看见。'
            },
            init: {
                low: '习惯被动等待指令，缺乏自主选择的勇气，内心有“不敢动”的卡点。',
                medium: '愿意尝试，但需要外界推动才能坚持。',
                high: '充满行动力，敢于为自己的选择负责。'
            },
            resp: {
                high: '有强烈的担当意识，愿意为自己的行为和承诺负责，是团队中可以依靠的人。'
            }
        };

        // 生成创伤关联解读（根据最低分）
        function getTraumaText(dim, score) {
            if (score > 4) return '';
            const traumaMap = {
                init: {
                    question: '“你小时候，是不是常常被催着走？”',
                    text: '你现在的“不敢动”，不是你的错，而是你小时候被动适应环境的生存策略。当“快点”成为日常，你学会了等待指令。'
                },
                exist: {
                    question: '“你小时候，是不是常常被忽略？”',
                    text: '你习惯了躲在角落，因为只有这样才安全。但今天，你已经可以站出来。'
                },
                trust: {
                    question: '“你小时候，是不是常常被骗？”',
                    text: '你学会了不轻易相信，因为这保护了你。但现在，你可以试着给值得的人机会。'
                }
            };
            return traumaMap[dim] || { question: '', text: '' };
        }

        // 主渲染函数
        function renderReport() {
            const p = getParams();
            const scores = [
                { key: 'exist', val: p.exist },
                { key: 'conf', val: p.conf },
                { key: 'init', val: p.init },
                { key: 'dili', val: p.dili },
                { key: 'safe', val: p.safe },
                { key: 'trust', val: p.trust },
                { key: 'resp', val: p.resp },
                { key: 'comp', val: p.comp }
            ];

            // 找出最低分和最高分
            let min = scores.reduce((a, b) => a.val < b.val ? a : b);
            let max = scores.reduce((a, b) => a.val > b.val ? a : b);

            // 生成核心洞察
            const coreInsight = `${p.name}的整体能量呈现「${dimNames[max.key]}有余，${dimNames[min.key]}不足」的特点。${dimNames[max.key]}是最大的优势，但${dimNames[min.key]}的不足正在消耗内在动力。`;

            // 构建HTML
            let html = `
                <div class="deco">✦✧⭐</div>
                <h1>VBC能量测评报告</h1>
                <div class="user-card">
                    <div class="user-name">${p.name}</div>
                    <div class="user-meta">📅 ${p.date} · 🆔 VBC-${p.date}-${Math.floor(Math.random()*1000)}</div>
                </div>

                <div class="section-title"><span>✨</span>核心洞察</div>
                <div class="quote">${coreInsight}</div>

                <div class="section-title"><span>📊</span>能量得分</div>
                <div class="card">
            `;

            // 添加所有得分条
            scores.forEach(s => {
                let info = getScoreInfo(s.val);
                html += `
                    <div class="score-item">
                        <span class="score-label">${dimNames[s.key]}</span>
                        <div class="score-bar-bg"><div class="score-bar ${info.color}" style="width: ${s.val*10}%;"></div></div>
                        <span class="score-value">${s.val.toFixed(1)}分 <span class="badge ${info.badge}">${info.text}</span></span>
                    </div>
                `;
            });

            html += `</div>`;

            // 重点维度：最低分
            let minInfo = getScoreInfo(min.val);
            html += `
                <div class="section-title"><span>🔍</span>重点解读</div>
                <div class="warning">
                    <p style="font-weight:600; margin-bottom:8px;">⚠️ 最低分：${dimNames[min.key]} (${min.val}分)</p>
                    <p>${interpretations[min.key]?.low || '需要特别关注这个维度'}</p>
            `;

            // 如果最低分≤4，添加扎心一问
            if (min.val <= 4) {
                let trauma = getTraumaText(min.key, min.val);
                if (trauma.question) {
                    html += `<p style="margin-top:15px; font-style:italic;">—— ${trauma.question}</p>`;
                }
            }
            html += `</div>`;

            // 最高分
            let maxInfo = getScoreInfo(max.val);
            html += `
                <div class="success">
                    <p style="font-weight:600; margin-bottom:8px;">✅ 最高分：${dimNames[max.key]} (${max.val}分)</p>
                    <p>${interpretations[max.key]?.high || '这是你的能量优势'}</p>
                </div>
            `;

            // 创伤关联（如果最低分≤4）
            if (min.val <= 4) {
                let trauma = getTraumaText(min.key, min.val);
                if (trauma.text) {
                    html += `
                        <div class="warning" style="background:#fff0e0;">
                            <p style="font-size:22px; text-align:center; margin:10px 0;">${trauma.question}</p>
                            <p style="margin:15px 0;">${trauma.text}</p>
                            <p style="background:#F5A623; color:#1A2B4C; padding:15px; border-radius:16px; text-align:center;">你可以对自己说：“我可以自己决定什么时候开始。”</p>
                        </div>
                    `;
                }
            }

            // 简单提升方案
            html += `
                <div class="section-title"><span>🌱</span>提升方向</div>
                <div class="card">
                    <p style="color:#F5A623; font-weight:600;">短期 (1-3个月)</p>
                    <p>每天3次具体看见 · 每天2-3个选择权 · 完成小任务后确认</p>
                    <p style="color:#F5A623; font-weight:600; margin-top:15px;">中期 (3-6个月)</p>
                    <p>强化优势领域 · 练习承诺兑现 · 接纳失败</p>
                    <p style="color:#F5A623; font-weight:600; margin-top:15px;">长期 (6个月+)</p>
                    <p>参与目标制定 · 探索热爱 · 连接学习意义</p>
                </div>

                <div class="cta">✦ 扫码加入会员专区 ✦</div>
                <div style="text-align:center; margin:10px 0;">
                    <p style="font-size:14px;">客服微信：shuangqu001</p>
                </div>

                <div class="footer">
                    <div style="font-weight:700; color:#1A2B4C;">双驱教育</div>
                    <div style="color:#F5A623; margin:5px 0;">让每个孩子都活在充足的能量里</div>
                </div>
            `;

            document.getElementById('report').innerHTML = html;
        }

        renderReport();
    </script>
</body>
</html>
